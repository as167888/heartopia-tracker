<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartopia 服务器数据追踪</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 24px 0 8px;
  }
  header h1 { font-size: 28px; color: #ff7fc0; }
  header p { color: #888; margin-top: 6px; font-size: 14px; }

  .cards {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px 0 24px;
  }
  .card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 20px 32px;
    text-align: center;
    min-width: 180px;
  }
  .card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .card .value { font-size: 32px; font-weight: 700; }
  .card .value.members { color: #5470c6; }
  .card .value.online { color: #91cc75; }

  .chart-container {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .chart-box { width: 100%; height: 380px; }

  footer {
    text-align: center;
    color: #555;
    font-size: 12px;
    padding: 16px 0 24px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Heartopia Discord 服务器</h1>
    <p>数据每小时自动更新 · 来源: Discord API</p>
  </header>

  <div class="cards">
    <div class="card">
      <div class="label">注册成员</div>
      <div class="value members" id="memberCount">-</div>
    </div>
    <div class="card">
      <div class="label">当前在线</div>
      <div class="value online" id="onlineCount">-</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-box" id="chartMembers"></div>
  </div>
  <div class="chart-container">
    <div class="chart-box" id="chartOnline"></div>
  </div>

  <footer>
    <span>最后更新: </span><span id="lastUpdate">-</span>
  </footer>
</div>

<script>
(function() {
  const chartMembers = echarts.init(document.getElementById('chartMembers'));
  const chartOnline = echarts.init(document.getElementById('chartOnline'));

  const darkTheme = {
    textStyle: { color: '#aaa' },
    grid: { top: 40, right: 30, bottom: 40, left: 60 },
    xAxis: {
      type: 'category',
      axisLine: { lineStyle: { color: '#333' } },
      axisLabel: { color: '#888', rotate: 30, fontSize: 11 },
    },
    yAxis: {
      type: 'value',
      axisLine: { lineStyle: { color: '#333' } },
      splitLine: { lineStyle: { color: '#1f1f3a' } },
      axisLabel: { color: '#888' },
    },
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1a1a2e',
      borderColor: '#333',
      textStyle: { color: '#e0e0e0' },
    },
    toolbox: {
      feature: {
        dataZoom: { yAxisIndex: 'none' },
        restore: {},
        saveAsImage: { pixelRatio: 2 },
      },
      right: 20,
      iconStyle: { borderColor: '#888' },
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', start: 0, end: 100, height: 24, bottom: 6,
        borderColor: '#333', backgroundColor: '#1a1a2e',
        fillerColor: 'rgba(84,112,198,0.2)', handleStyle: { color: '#5470c6' } }
    ],
  };

  function formatNumber(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return n.toLocaleString();
  }

  function render(data) {
    if (!data || !data.length) {
      document.getElementById('memberCount').textContent = '无数据';
      document.getElementById('onlineCount').textContent = '无数据';
      return;
    }

    const timestamps = data.map(d => d.timestamp);
    const members = data.map(d => d.member_count);
    const online = data.map(d => d.presence_count);
    const latest = data[data.length - 1];

    document.getElementById('memberCount').textContent = latest.member_count.toLocaleString();
    document.getElementById('onlineCount').textContent = latest.presence_count.toLocaleString();
    document.getElementById('lastUpdate').textContent = latest.timestamp;

    chartMembers.setOption({
      ...darkTheme,
      title: { text: '注册成员趋势', left: 'center', textStyle: { color: '#ccc', fontSize: 15 } },
      series: [{
        name: '成员数', type: 'line', data: members,
        smooth: true, symbol: 'none',
        lineStyle: { color: '#5470c6', width: 2 },
        areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
          [{offset:0, color:'rgba(84,112,198,0.3)'},{offset:1, color:'rgba(84,112,198,0.02)'}]) },
      }],
      xAxis: { ...darkTheme.xAxis, data: timestamps },
      yAxis: { ...darkTheme.yAxis, axisLabel: { ...darkTheme.yAxis.axisLabel, formatter: formatNumber } },
      tooltip: { ...darkTheme.tooltip, formatter: p => `${p[0].axisValue}<br/>成员: <b>${p[0].value.toLocaleString()}</b>` },
    });

    chartOnline.setOption({
      ...darkTheme,
      title: { text: '在线人数趋势', left: 'center', textStyle: { color: '#ccc', fontSize: 15 } },
      series: [{
        name: '在线', type: 'line', data: online,
        smooth: true, symbol: 'none',
        lineStyle: { color: '#91cc75', width: 2 },
        areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
          [{offset:0, color:'rgba(145,204,117,0.3)'},{offset:1, color:'rgba(145,204,117,0.02)'}]) },
      }],
      xAxis: { ...darkTheme.xAxis, data: timestamps },
      yAxis: { ...darkTheme.yAxis, axisLabel: { ...darkTheme.yAxis.axisLabel, formatter: formatNumber } },
      tooltip: { ...darkTheme.tooltip, formatter: p => `${p[0].axisValue}<br/>在线: <b>${p[0].value.toLocaleString()}</b>` },
    });
  }

  fetch('data/heartopia_data.json')
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('memberCount').textContent = '加载失败';
      document.getElementById('onlineCount').textContent = '加载失败';
    });

  window.addEventListener('resize', () => {
    chartMembers.resize();
    chartOnline.resize();
  });
})();
</script>
</body>
</html>
